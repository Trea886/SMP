<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反应挑战机 - 全球排行榜</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  :root {
    --bg: #0a0a14;
    --card: #12122a;
    --text: #e0e0e0;
    --dim: #666;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --cyan: #00e5ff;
    --green: #00e676;
    --orange: #ff9100;
    --red: #ff3d00;
    --accent: #6200ea;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 500px;
  }
  header {
    text-align: center;
    padding: 30px 0 20px;
  }
  header h1 {
    font-size: 28px;
    background: linear-gradient(135deg, var(--cyan), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  header .sub {
    color: var(--dim);
    font-size: 13px;
  }

  /* Status bar */
  .status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--dim);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
  }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
  }
  .tabs button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--dim);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .tabs button.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* Control Panel */
  .control {
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .control .title {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .control .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .control button {
    flex: 1;
    min-width: 80px;
    padding: 10px 6px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .control button:active { transform: scale(0.95); }
  .btn-gesture { background: #ffd700; color: #1a1a00; }
  .btn-sonic   { background: #00e676; color: #002200; }
  .btn-combo   { background: #ff9100; color: #1a0800; }
  .btn-back    { background: transparent; border: 1px solid var(--dim) !important; color: var(--dim); font-size: 11px !important; }
  .control .hint {
    font-size: 10px;
    color: var(--dim);
    margin-top: 10px;
    text-align: center;
  }

  /* Online count */
  .online-count {
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 12px;
  }

  /* Leaderboard list */
  .board {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .row {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    background: var(--card);
    border-radius: 10px;
    transition: transform .2s, box-shadow .2s;
  }
  .row.top-1 { border: 1px solid var(--gold); box-shadow: 0 0 12px rgba(255,215,0,.15); }
  .row.top-2 { border: 1px solid var(--silver); }
  .row.top-3 { border: 1px solid var(--bronze); }

  .rank {
    width: 32px;
    font-size: 18px;
    text-align: center;
    font-weight: 700;
    flex-shrink: 0;
  }
  .rank.gold { color: var(--gold); }
  .rank.silver { color: var(--silver); }
  .rank.bronze { color: var(--bronze); }

  .info { flex: 1; margin-left: 10px; min-width: 0; }
  .name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .detail {
    font-size: 11px;
    color: var(--dim);
    margin-top: 2px;
  }
  .score-block {
    text-align: right;
    flex-shrink: 0;
  }
  .score {
    font-size: 20px;
    font-weight: 700;
    color: var(--cyan);
  }
  .combo {
    font-size: 11px;
    color: var(--orange);
  }

  /* Footer stats */
  .stats {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
    padding: 14px;
    background: var(--card);
    border-radius: 10px;
    font-size: 12px;
    color: var(--dim);
  }
  .stats strong { display: block; color: var(--text); font-size: 18px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 14px;
  }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .row { animation: slideIn .3s ease; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>反应挑战机</h1>
    <div class="sub">全球排行榜</div>
  </header>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">连接中...</span>
  </div>

  <!-- Remote Control -->
  <div class="control">
    <div class="title">远程控制 - 选择模式</div>
    <div class="btn-row">
      <button class="btn-gesture" onclick="sendCmd('gesture')">手势闪电</button>
      <button class="btn-sonic"   onclick="sendCmd('sonic')">超声波快拍</button>
      <button class="btn-combo"   onclick="sendCmd('combo')">连击挑战</button>
      <button class="btn-back"    onclick="sendCmd('back')">返回菜单</button>
    </div>
    <div class="hint">点击按钮远程控制 ESP32 游戏机</div>
  </div>

  <div class="tabs">
    <button data-mode="all" class="active">全部</button>
    <button data-mode="gesture">手势闪电</button>
    <button data-mode="sonic">超声波快拍</button>
    <button data-mode="combo">连击挑战</button>
  </div>

  <div class="online-count" id="onlineCount">--</div>

  <div class="board" id="board">
    <div class="empty">等待分数中...</div>
  </div>

  <div class="stats">
    <div>总场次<br><strong id="statGames">0</strong></div>
    <div>最高分<br><strong id="statTop">0</strong></div>
    <div>最高连击<br><strong id="statCombo">0</strong></div>
    <div>设备数<br><strong id="statDevices">0</strong></div>
  </div>
</div>

<script>
// ==================== MQTT ====================
const BROKER = 'broker.emqx.io';
const WS_PORT = 8084;
const TOPIC_SCORE   = '/reaction/score';
const TOPIC_CONTROL = '/reaction/control';

let allScores = [];
let filterMode = 'all';
let deviceSet = new Set();

const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const boardEl = document.getElementById('board');
const onlineEl = document.getElementById('onlineCount');

// Try these URLs in order until one connects
const WS_URLS = [
  'wss://broker.emqx.io:8084/mqtt',
  'ws://broker.emqx.io:8083/mqtt',
];

let urlIdx = 0;
let client;

function tryConnect() {
  if (urlIdx >= WS_URLS.length) {
    statusText.textContent = '连接失败 - 请检查网络';
    return;
  }
  const url = WS_URLS[urlIdx];
  console.log('Trying:', url);
  statusText.textContent = '尝试连接 ' + url.split('://')[1].split('/')[0] + '...';

  client = mqtt.connect(url, {
    clientId: 'web_lb_' + Math.random().toString(36).slice(2, 8),
    keepalive: 30,
    clean: true,
    connectTimeout: 5000,
  });

  client.on('connect', () => {
    statusDot.classList.add('live');
    statusText.textContent = '已连接 (' + url.split('://')[1].split('/')[0] + ')';
    client.subscribe(TOPIC_SCORE, { qos: 0 });
  });

  client.on('error', (err) => {
    console.warn('Failed:', url, err);
    urlIdx++;
    setTimeout(tryConnect, 1000);
  });

  client.on('close', () => {
    statusDot.classList.remove('live');
    statusText.textContent = '重连中...';
  });

  client.on('message', (topic, payload) => {
    try {
      const data = JSON.parse(payload.toString());
      data._time = Date.now();
      allScores.push(data);
      deviceSet.add(data.device || 'unknown');
      if (allScores.length > 200) allScores = allScores.slice(-200);
      render();
    } catch (e) {
      console.warn('Bad payload:', payload.toString());
    }
  });
}

tryConnect();

// ==================== Render ====================

function getLeaderboard() {
  let filtered = allScores;
  if (filterMode !== 'all') {
    filtered = allScores.filter(s => s.mode === filterMode);
  }
  // Sort by score desc, take top per device
  const best = {};
  filtered.forEach(s => {
    const key = s.device || 'unknown';
    if (!best[key] || s.score > best[key].score) best[key] = s;
  });
  return Object.values(best).sort((a, b) => b.score - a.score).slice(0, 20);
}

function render() {
  const board = getLeaderboard();

  if (board.length === 0) {
    boardEl.innerHTML = '<div class="empty">Waiting for scores...</div>';
  } else {
    boardEl.innerHTML = board.map((s, i) => {
      const rank = i + 1;
      let rankClass = '';
      if (rank === 1) rankClass = 'gold top-1';
      else if (rank === 2) rankClass = 'silver top-2';
      else if (rank === 3) rankClass = 'bronze top-3';

      const modeName = { gesture: '手势闪电', sonic: '超声波快拍', combo: '连击挑战' }[s.mode] || s.mode;
      const timeAgo = Math.floor((Date.now() - s._time) / 1000);
      const agoStr = timeAgo < 60 ? timeAgo + '秒前' :
                     timeAgo < 3600 ? Math.floor(timeAgo/60) + '分钟前' : '---';

      return `
        <div class="row ${rank <= 3 ? 'top-' + rank : ''}">
          <div class="rank ${rankClass}">${rank <= 3 ? ['1','2','3'][rank-1] : rank}</div>
          <div class="info">
            <div class="name">${esc(s.device || 'Unknown')}</div>
            <div class="detail">${modeName} &middot; ${agoStr}</div>
          </div>
          <div class="score-block">
            <div class="score">${s.score}</div>
            <div class="combo">${s.combo ? 'x' + s.combo : ''}</div>
          </div>
        </div>`;
    }).join('');
  }

  // Stats
  document.getElementById('statGames').textContent = allScores.length;
  document.getElementById('statTop').textContent = board.length ? board[0].score : 0;
  document.getElementById('statCombo').textContent = board.length
    ? Math.max(...board.map(s => s.combo || 0)) : 0;
  document.getElementById('statDevices').textContent = deviceSet.size;
  onlineEl.textContent = deviceSet.size + ' 台设备 &middot; ' + allScores.length + ' 场游戏';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ==================== Tabs ====================
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMode = btn.dataset.mode;
    render();
  });
});

// ==================== Remote Control ====================

function sendCmd(cmd) {
  if (!client || !client.connected) {
    alert('MQTT 未连接，请检查网络状态');
    return;
  }
  const payload = JSON.stringify({ cmd: cmd });
  client.publish(TOPIC_CONTROL, payload);
  console.log('Sent:', payload);

  // Brief flash feedback on all buttons
  document.querySelectorAll('.control button').forEach(b => b.style.opacity = '0.5');
  setTimeout(() => {
    document.querySelectorAll('.control button').forEach(b => b.style.opacity = '1');
  }, 200);
}

// Periodic refresh for "x min ago"
setInterval(render, 10000);
</script>
</body>
</html>
