<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反应挑战机 · 全球排行榜</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Orbitron','Courier New','Consolas',monospace;
    background:#050510;
    color:#c0d0e0;
    min-height:100vh;
    overflow-x:hidden;
  }
  #fx{position:fixed;top:0;left:0;z-index:0}

  /* ===== Scanlines ===== */
  .scan{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
    opacity:.4;
  }

  /* ===== Vignette ===== */
  .vignette{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 60%,rgba(5,5,16,.7) 100%);
  }

  .wrap{position:relative;z-index:2;max-width:540px;margin:0 auto;padding:0 20px 80px}

  /* ===== Header ===== */
  .header{text-align:center;padding:50px 0 30px}
  .header h1{
    font-size:48px;font-weight:900;letter-spacing:6px;
    background:radial-gradient(circle 80px at 30% 50%, #f0f, #0ff);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 10px rgba(0,255,255,.4)) drop-shadow(0 0 30px rgba(0,255,255,.2));
    transition:filter .3s;
  }
  .header h1:hover{filter:drop-shadow(0 0 10px rgba(255,0,255,.5)) drop-shadow(0 0 30px rgba(255,0,255,.3));}
  .sub{font-size:11px;color:rgba(0,255,255,.3);letter-spacing:8px;margin-top:4px}
  .live{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    padding:5px 16px;border:1px solid rgba(0,255,255,.15);
    font-size:11px;font-weight:700;color:#0f0;
  }
  .live-dot{width:6px;height:6px;border-radius:50%;background:#0f0;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,0,.6)}50%{box-shadow:0 0 0 8px rgba(0,255,0,0)}}

  /* ===== Sections ===== */
  .sec{font-size:10px;font-weight:700;letter-spacing:4px;color:rgba(0,255,255,.25);margin:28px 0 8px;display:flex;align-items:center;gap:8px}
  .sec::after{content:'';flex:1;height:1px;background:rgba(0,255,255,.06)}

  /* ===== Podium ===== */
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:16px 8px 20px;background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.08)}
  .pc{flex:1;max-width:140px;text-align:center;padding:18px 4px 14px;background:rgba(0,0,0,.3);border:1px solid transparent;transition:all .3s}
  .pc._1{order:2;transform:translateY(-18px);border-color:rgba(255,215,0,.3);background:rgba(30,20,0,.4);box-shadow:0 0 20px rgba(255,200,0,.08)}
  .pc._2{order:1}.pc._3{order:3}
  .pc:hover{background:rgba(255,255,255,.03)}
  .pr{font-size:34px;font-weight:900}
  ._1 .pr{color:#fd0;text-shadow:0 0 16px rgba(255,200,0,.5);position:relative}
  ._1 .pr::after{content:'👑';position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:22px;animation:crownBounce 2s infinite}
  @keyframes crownBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
  ._2 .pr{color:#999;position:relative}
  ._2 .pr::after{content:'🥈';position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:16px}
  ._3 .pr{color:#c87a50;position:relative}
  ._3 .pr::after{content:'🥉';position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:16px}
  .pn{font-size:13px;font-weight:600;margin-top:4px}
  .ps{font-size:24px;font-weight:900;color:#0ff;text-shadow:0 0 8px rgba(0,255,255,.3)}
  .pcb{font-size:10px;color:#f0f;font-weight:700;letter-spacing:1px}

  /* ===== Player Name Input ===== */
  .player-box{display:flex;gap:4px;align-items:center}
  .player-input{
    flex:1;padding:8px 12px;
    background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.15);
    color:#0ff;font-family:inherit;font-size:12px;letter-spacing:1px;
    outline:none;transition:border-color .2s;
  }
  .player-input:focus{border-color:rgba(0,255,255,.4)}
  .player-input::placeholder{color:#333}
  .btn-player{
    padding:8px 14px;border:1px solid rgba(0,255,255,.25);
    background:rgba(0,255,255,.05);color:#0ff;
    font-family:inherit;font-size:11px;font-weight:700;letter-spacing:1px;
    cursor:pointer;transition:all .2s;
  }
  .btn-player:hover{background:rgba(0,255,255,.1)}
  .player-name{font-size:10px;color:rgba(0,255,255,.3);text-align:center;margin-top:4px;letter-spacing:1px}

  /* ===== Buttons ===== */
  .btns{display:flex;gap:6px;flex-wrap:wrap}
  .btn{flex:1;min-width:60px;padding:12px 6px;border:1px solid #222;background:rgba(0,0,0,.4);font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;color:#888}
  .btn:hover{transform:translateY(-2px)}
  .btn-g{color:#0ff;border-color:rgba(0,255,255,.25)}
  .btn-g:hover{background:rgba(0,255,255,.06);box-shadow:0 0 20px rgba(0,255,255,.1)}
  .btn-s{color:#0fc;border-color:rgba(0,255,200,.2)}
  .btn-s:hover{background:rgba(0,255,200,.05);box-shadow:0 0 20px rgba(0,255,200,.08)}
  .btn-c{color:#f0f;border-color:rgba(255,0,255,.2)}
  .btn-c:hover{background:rgba(255,0,255,.05);box-shadow:0 0 20px rgba(255,0,255,.08)}
  .btn-x{color:#555}.btn-x:hover{color:#999}
  .btn-demo{margin-top:8px;padding:6px 16px;border:1px dashed rgba(0,255,255,.1);background:transparent;font-family:inherit;color:rgba(0,255,255,.3);font-size:10px;letter-spacing:2px;cursor:pointer;transition:all .2s}
  .btn-demo:hover{border-color:#0ff;color:#0ff}

  /* ===== Tabs ===== */
  .tabs{display:flex;gap:2px;background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.06);padding:3px}
  .tab{flex:1;padding:10px 4px;border:none;background:transparent;font-family:inherit;color:#555;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer}
  .tab.active{background:rgba(0,255,255,.06);color:#0ff}
  .tab:hover:not(.active){color:#aaa}

  /* ===== Scores ===== */
  .slist{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .srow{display:flex;align-items:center;padding:12px 16px;background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.04);transition:all .25s}
  .srow:hover{border-color:rgba(0,255,255,.15);background:rgba(0,0,0,.6);transform:translateX(4px)}
  .srow.new{border-color:#0ff;box-shadow:0 0 12px rgba(0,255,255,.1)}
  .r{width:26px;font-size:16px;font-weight:900}
  .r.g{color:#fd0;position:relative}
  .r.g::before{content:'👑';position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:10px}.r.s{color:#999;position:relative}
.r.s::before{content:'🥈';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:8px}
.r.b{color:#c87a50;position:relative}
.r.b::before{content:'🥉';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:8px}
  .info{flex:1;margin-left:12px}
  .name{font-size:13px;font-weight:600}
  .meta{font-size:10px;color:#555;margin-top:1px}
  .val{text-align:right}
  .sc{font-size:20px;font-weight:900;color:#0ff;text-shadow:0 0 8px rgba(0,255,255,.2)}
  .cb{font-size:10px;color:#f0f;font-weight:700}

  /* ===== Stats ===== */
  .stats{display:flex;justify-content:space-around;margin-top:24px;padding:18px 10px;background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.06)}
  .st2{text-align:center}
  .sv2{font-size:22px;font-weight:900}
  .sl2{font-size:9px;color:#555;letter-spacing:2px;margin-top:4px}

  /* ===== Toast ===== */
  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.9);border:1px solid #0ff;color:#0ff;
    padding:10px 24px;font-size:12px;font-weight:700;letter-spacing:2px;
    z-index:999;pointer-events:none;
    text-shadow:0 0 8px rgba(0,255,255,.5);
    animation:ti .3s ease,to .3s ease 2s forwards;
  }
  @keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-15px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes to{to{opacity:0;transform:translateX(-50%) translateY(-15px)}}

  /* ===== COMBO Fire ===== */
  .fire{
    position:fixed;top:40%;left:50%;z-index:998;pointer-events:none;
    font-size:52px;font-weight:900;color:#f0f;
    text-shadow:0 0 30px #f0f,0 0 60px rgba(255,0,255,.6),0 0 100px rgba(255,0,255,.3);
    animation:firePop .8s ease-out forwards;
  }
  @keyframes firePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-5deg)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(3deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.6) rotate(0)}}

  /* DOM particles */
  .pt{position:fixed;pointer-events:none;z-index:997;font-size:14px;animation:ptFly 1s ease-out forwards}
  @keyframes ptFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.3)}}
</style>
</head>
<body>

<canvas id="fx"></canvas>
<div class="scan"></div>
<div class="vignette"></div>

<div class="wrap">
  <div class="header">
    <h1 id="title">反应挑战机</h1>
    <div class="sub">GLOBAL LEADERBOARD · 全球排行榜</div>
    <div class="live"><div class="live-dot" id="ld"></div><span id="lt">CONNECTING...</span></div>
  </div>

  <div class="sec">PODIUM · 领奖台</div>
  <div class="podium" id="podium"><div style="text-align:center;padding:24px;flex:1;color:#444">AWAITING...</div></div>

  <div class="sec">PLAYER · 玩家</div>
  <div class="player-box">
    <input class="player-input" id="playerInput" placeholder="输入你的名字..." maxlength="12" onkeydown="if(event.key==='Enter')setPlayer()">
    <button class="btn-player" onclick="setPlayer()">确认</button>
  </div>
  <div class="player-name" id="playerLabel">未设置玩家名</div>

  <div class="sec">REMOTE CONTROL · 远程控制</div>
  <div class="btns">
    <button class="btn btn-g" onclick="sendCmd('gesture')">GESTURE 手势</button>
    <button class="btn btn-s" onclick="sendCmd('sonic')">SONIC 超声波</button>
    <button class="btn btn-c" onclick="sendCmd('combo')">COMBO 连击</button>
    <button class="btn btn-x" onclick="sendCmd('back')">MENU 返回</button>
  </div>
  <button class="btn-demo" onclick="injectDemo()">INJECT DEMO DATA · 注入模拟数据</button>

  <div class="sec">RANKINGS · 排行榜</div>
  <div class="tabs">
    <button class="tab active" data-mode="all">ALL 全部</button>
    <button class="tab" data-mode="gesture">GESTURE 手势</button>
    <button class="tab" data-mode="sonic">SONIC 超声波</button>
    <button class="tab" data-mode="combo">COMBO 连击</button>
  </div>
  <div class="slist" id="slist"><div style="text-align:center;padding:32px;color:#444">AWAITING DATA...</div></div>

  <div class="stats">
    <div class="st2"><div class="sv2" id="sg">0</div><div class="sl2">GAMES 场次</div></div>
    <div class="st2"><div class="sv2" id="st">0</div><div class="sl2">TOP 最高</div></div>
    <div class="st2"><div class="sv2" id="scm">0</div><div class="sl2">COMBO 连击</div></div>
    <div class="st2"><div class="sv2" id="sd">0</div><div class="sl2">DEVICES 设备</div></div>
  </div>
</div>

<script>
// ==================== MQTT ====================
const TS='/reaction/score',TC='/reaction/control',TP='/reaction/player';
const WS=['wss://broker.emqx.io:8084/mqtt','ws://broker.emqx.io:8083/mqtt'];
let scores=[],mode='all',devs=new Set(),cli,topScore=0,ui=0;
const $=id=>document.getElementById(id);

// ===== Title: gradient color follows mouse =====
const tl=$('title');
tl.addEventListener('mousemove',e=>{
  const r=tl.getBoundingClientRect();
  const x=((e.clientX-r.left)/r.width*100).toFixed(0);
  const y=((e.clientY-r.top)/r.height*100).toFixed(0);
  tl.style.background='radial-gradient(circle 80px at '+x+'% '+y+'%, #f0f, #0ff)';
  tl.style.webkitBackgroundClip='text';tl.style.backgroundClip='text';
});
tl.addEventListener('mouseleave',()=>{
  tl.style.background='radial-gradient(circle 80px at 30% 50%, #f0f, #0ff)';
  tl.style.webkitBackgroundClip='text';tl.style.backgroundClip='text';
});

function conn(){
  if(ui>=WS.length){$('lt').textContent='OFFLINE';return}
  cli=mqtt.connect(WS[ui],{clientId:'w_'+Math.random().toString(36).slice(2,8),keepalive:30,clean:true,connectTimeout:5000});
  cli.on('connect',()=>{$('ld').style.background='#0f0';$('lt').textContent='CONNECTED';cli.subscribe(TS,{qos:0})});
  cli.on('error',()=>{ui++;setTimeout(conn,1000)});
  cli.on('close',()=>{$('ld').style.background='#f44';$('lt').textContent='RECONNECTING...'});
  cli.on('message',(t,p)=>{
    try{
      const d=JSON.parse(p.toString());d._t=Date.now();d._id=Math.random().toString(36).slice(2,6);
      scores.push(d);devs.add(d.device||'?');if(scores.length>300)scores=scores.slice(-200);
      const mc=Math.max(...scores.map(s=>s.combo||0));
      if(d.combo&&d.combo>=5&&d.combo===mc)showFire(d.combo);
      if(d.score>topScore&&topScore>0){spawnP(30);showToast('NEW RECORD: '+d.score)}
      topScore=Math.max(topScore,d.score);if(scores.length===1)topScore=d.score;
      render();setTimeout(()=>{const e=document.getElementById('r-'+d._id);if(e){e.classList.remove('new');void e.offsetWidth;e.classList.add('new')}},50);
    }catch(e){}
  });
}
conn();

function board(){
  let f=scores;if(mode!=='all')f=scores.filter(s=>s.mode===mode);
  const b={};f.forEach(s=>{const k=s.device||'?';if(!b[k]||s.score>b[k].score)b[k]=s});
  return Object.values(b).sort((a,b)=>b.score-a.score).slice(0,20);
}
function esc(s){const d=document.createElement('div');d.textContent=s||'?';return d.innerHTML}

function render(){
  const b=board(),pod=$('podium'),t3=b.slice(0,3);
  while(t3.length<3)t3.push(null);
  pod.innerHTML=t3.map((s,i)=>{const rk=i+1;
    if(!s)return'<div class="pc _'+rk+'"><div class="pr">'+rk+'</div><div class="pn" style="color:#444">---</div></div>';
    return'<div class="pc _'+rk+'"><div class="pr">'+rk+'</div><div class="pn">'+esc(s.device)+'</div><div class="ps">'+s.score+'</div><div class="pcb">'+(s.combo?'COMBO x'+s.combo:'')+'</div></div>';
  }).join('');
  const list=$('slist');
  if(!b.length){list.innerHTML='<div style="text-align:center;padding:32px;color:#444">AWAITING DATA...</div>'}
  else list.innerHTML=b.map((s,i)=>{const rk=i+1,rc=rk===1?'g':rk===2?'s':rk===3?'b':'';
    const mm={gesture:'GESTURE 手势闪电',sonic:'SONIC 超声波快拍',combo:'COMBO 连击挑战'};
    const ago=Math.floor((Date.now()-s._t)/1000);
    return'<div class="srow" id="r-'+s._id+'"><div class="r '+rc+'">'+rk+'</div><div class="info"><div class="name">'+esc(s.device)+'</div><div class="meta">'+(mm[s.mode]||s.mode)+' // '+(ago<60?ago+'s':ago<3600?Math.floor(ago/60)+'m':'---')+'</div></div><div class="val"><div class="sc">'+s.score+'</div><div class="cb">'+(s.combo?'x'+s.combo:'')+'</div></div></div>';
  }).join('');
  $('sg').textContent=scores.length;$('st').textContent=b.length?b[0].score:0;
  $('scm').textContent=b.length?Math.max(...b.map(s=>s.combo||0)):0;$('sd').textContent=devs.size;
}

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');mode=b.dataset.mode;render();
}));

function sendCmd(cmd){
  if(!cli||!cli.connected){showToast('NO CONNECTION');return}
  cli.publish(TC,JSON.stringify({cmd}));
}

function setPlayer(){
  const inp=document.getElementById('playerInput');
  const name=inp.value.trim();
  if(!name){showToast('请输入名字');return}
  if(!cli||!cli.connected){showToast('MQTT 未连接');return}
  cli.publish(TP,JSON.stringify({name}));
  document.getElementById('playerLabel').textContent='当前玩家: '+name;
  showToast('玩家名已发送: '+name);
  inp.value='';
}

function injectDemo(){
  const devs2=['ALPHA','BETA','GAMMA','DELTA','NEON','PHOTON'];
  const modes2=['gesture','sonic','combo'];
  for(let i=0;i<15;i++){
    scores.push({device:devs2[Math.floor(Math.random()*6)],score:20+Math.floor(Math.random()*220),mode:modes2[Math.floor(Math.random()*3)],combo:Math.floor(Math.random()*16),_t:Date.now()-Math.floor(Math.random()*600000),_id:Math.random().toString(36).slice(2,6)});
    devs.add(scores[scores.length-1].device);
    if(scores[scores.length-1].score>topScore)topScore=scores[scores.length-1].score;
  }
  render();showToast('DEMO DATA LOADED');
}

function showToast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2300)}
function showFire(c){const e=document.createElement('div');e.className='fire';e.textContent='COMBO x'+c;document.body.appendChild(e);setTimeout(()=>e.remove(),900)}
function spawnP(n){
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    p.textContent='✦◈◆⬡✧⬢◉◎◇△⬠◂▸'[Math.floor(Math.random()*15)];
    p.style.left='50%';p.style.top='35%';
    p.style.color='hsl('+(180+Math.random()*100)+',90%,'+(50+Math.random()*40)+'%)';
    p.style.fontSize=(10+Math.random()*12)+'px';
    p.style.setProperty('--dx',(Math.random()-.5)*500+'px');
    p.style.setProperty('--dy',-(Math.random()*350+50)+'px');
    p.style.animationDuration=(.6+Math.random()*1.2)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),1200);
  }
}

// ==================== CANVAS: FULL PARTICLE ENGINE ====================
const cv=$('fx'),ctx=cv.getContext('2d');
let W=innerWidth,H=innerHeight,mx=W/2,my=H/2;
cv.width=W;cv.height=H;
onresize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};

// ---- Particle types ----
// nodes: main floating particles with physics
// dust: galaxy dust — tiny, slow, warm colors
// nebula: large soft glowing blobs
// sparkles: short-lived bright dots
let nodes=[],sparkles=[],dataRain=[],dust=[],nebulae=[];

// Init nodes — core data orbs
for(let i=0;i<160;i++){
  nodes.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5,
    r:1+Math.random()*3.5,
    hue:180+Math.random()*100,
    alpha:.2+Math.random()*.5,
    phase:Math.random()*Math.PI*2
  });
}

// Init galaxy dust — tiny, warm-toned, slow drifting
for(let i=0;i<350;i++){
  dust.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.15, vy:(Math.random()-.5)*.15,
    r:.3+Math.random()*1.2,
    hue:260+Math.random()*100, // purple to pink
    alpha:.3+Math.random()*.5,
    phase:Math.random()*Math.PI*2
  });
}

// Init nebulae — large soft colored blobs
for(let i=0;i<10;i++){
  nebulae.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.08, vy:(Math.random()-.5)*.08,
    r:60+Math.random()*120,
    hue:[200,280,340,180,260,320,220,300,350,240][i],
    alpha:.02+Math.random()*.03
  });
}

// Init data rain
for(let i=0;i<100;i++){
  dataRain.push({
    x:Math.random()*W, y:Math.random()*H,
    len:8+Math.random()*50,
    speed:.3+Math.random()*3,
    alpha:.03+Math.random()*.12
  });
}

document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  // Spawn sparkles on movement
  for(let i=0;i<2;i++){
    sparkles.push({x:mx+(Math.random()-.5)*15,y:my+(Math.random()-.5)*15,r:.5+Math.random()*2,h:180+Math.random()*80,a:1,decay:.02+Math.random()*.04});

// Init star clusters — tight groups with orbital drift
let clusters=[];
for(let c=0;c<6;c++){
  const cx=Math.random()*W, cy=Math.random()*H;
  for(let i=0;i<50;i++){
    clusters.push({
      x:cx+(Math.random()-.5)*120, y:cy+(Math.random()-.5)*120,
      r:.3+Math.random()*1.8,
      hue:200+Math.random()*140,
      alpha:.35+Math.random()*.55,
      phase:Math.random()*Math.PI*2,
      ox:cx, oy:cy
    });
  }
}  }
  // Attract nearby nodes to mouse
  nodes.forEach(n=>{
    const dx=mx-n.x, dy=my-n.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150){n.vx+=dx/dist*.03;n.vy+=dy/dist*.03}
  });
});

document.addEventListener('click',e=>{
  // Explosion burst
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2, speed=1+Math.random()*4;
    sparkles.push({x:e.clientX,y:e.clientY,r:1+Math.random()*3,h:180+Math.random()*80,a:1,decay:.01+Math.random()*.03,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed});
  }
  // Ring
  for(let i=0;i<16;i++){
    const a=i/16*Math.PI*2;
    sparkles.push({x:e.clientX+Math.cos(a)*30,y:e.clientY+Math.sin(a)*30,r:1.5,h:280+Math.random()*40,a:.8,decay:.02,vx:Math.cos(a)*2,vy:Math.sin(a)*2});
  }
  // DOM particles too
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='pt';
    p.textContent='●';p.style.left=e.clientX+'px';p.style.top=e.clientY+'px';
    p.style.fontSize=(3+Math.random()*8)+'px';
    p.style.color='hsl('+(180+Math.random()*100)+',90%,60%)';
    p.style.setProperty('--dx',(Math.random()-.5)*150+'px');
    p.style.setProperty('--dy',(Math.random()-.5)*150+'px');
    p.style.animationDuration='.5s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),600);
  }
});

// ===== MAIN RENDER =====
(function loop(){
  ctx.clearRect(0,0,W,H);

  const t=Date.now()/1000;

  // ---- 1. Nebulae — large soft colored clouds ----
  nebulae.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<-200)n.x=W+200;if(n.x>W+200)n.x=-200;
    if(n.y<-200)n.y=H+200;if(n.y>H+200)n.y=-200;
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,'hsla('+n.hue+',60%,50%,'+n.alpha+')');
    g.addColorStop(.5,'hsla('+n.hue+',50%,30%,'+(n.alpha*.4)+')');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
  });

  // ---- 2. Galaxy dust — tiny warm particles ----
  dust.forEach(d=>{
    d.x+=d.vx+Math.sin(t+d.phase)*.08;
    d.y+=d.vy+Math.cos(t+d.phase)*.08;
    if(d.x<-20)d.x=W+20;if(d.x>W+20)d.x=-20;
    if(d.y<-20)d.y=H+20;if(d.y>H+20)d.y=-20;
    ctx.fillStyle='hsla('+d.hue+',60%,70%,'+(d.alpha+Math.sin(t*2+d.phase)*.15)+')';
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();
  });

  // ---- 3. Connection lines ----
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        const a=.05*(1-dist/100);
        ctx.strokeStyle='rgba(0,200,255,'+a+')';
        ctx.lineWidth=.4;
        ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
      }
    }
  }

  // ---- 4. Data rain ----
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        const a=.06*(1-dist/120);
        ctx.strokeStyle='rgba(0,200,255,'+a+')';
        ctx.lineWidth=.5;
        ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
      }
    }
  }

  // ---- 3. Data rain ----
  dataRain.forEach(d=>{
    d.y+=d.speed;
    if(d.y>H+50){d.y=-50;d.x=Math.random()*W}
    ctx.strokeStyle='rgba(0,255,200,'+d.alpha+')';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x,d.y+d.len);ctx.stroke();
    // Small dot at head
    ctx.fillStyle='rgba(0,255,200,'+(d.alpha*2)+')';
    ctx.beginPath();ctx.arc(d.x,d.y,1.5,0,Math.PI*2);ctx.fill();
  });

  // ---- 4. Nodes with organic movement ----
  nodes.forEach(n=>{
    // Sinusoidal drift
    n.vx+=Math.sin(t*2+n.phase)*.005;
    n.vy+=Math.cos(t*1.7+n.phase)*.005;
    // Damping
    n.vx*=.99;n.vy*=.99;
    n.x+=n.vx;n.y+=n.vy;
    // Wrap
    if(n.x<-50)n.x=W+50;if(n.x>W+50)n.x=-50;
    if(n.y<-50)n.y=H+50;if(n.y>H+50)n.y=-50;

    // Glow orb
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3);
    g.addColorStop(0,'hsla('+n.hue+',80%,60%,'+n.alpha+')');
    g.addColorStop(.4,'hsla('+n.hue+',80%,50%,'+(n.alpha*.3)+')');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*3,0,Math.PI*2);ctx.fill();
  });

  // ---- 5. Sparkles ----
  sparkles=sparkles.filter(s=>s.a>0);
  sparkles.forEach(s=>{
    if(s.vx!==undefined){s.x+=s.vx;s.y+=s.vy;s.vx*=.96;s.vy*=.96}
    s.a-=s.decay;
    ctx.fillStyle='hsla('+s.h+',90%,70%,'+s.a+')';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });

  // ---- 6. Flashlight: bright center follows mouse ----
  const fg=ctx.createRadialGradient(mx,my,20,mx,my,350);
  fg.addColorStop(0,'rgba(200,220,255,.07)');
  fg.addColorStop(.3,'rgba(160,200,240,.04)');
  fg.addColorStop(.6,'rgba(100,140,200,.015)');
  fg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);

  // ---- 7. Mouse grid (subtle) ----
  const gx=Math.floor(mx/50)*50,gy=Math.floor(my/50)*50;
  for(let x=gx-180;x<=gx+180;x+=50){
    if(x<0||x>W)continue;
    const a=.04*(1-Math.abs(x-mx)/180);
    if(a>0){ctx.strokeStyle='rgba(0,200,255,'+a+')';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x,Math.max(0,gy-180));ctx.lineTo(x,Math.min(H,gy+180));ctx.stroke()}
  }
  for(let y=gy-180;y<=gy+180;y+=50){
    if(y<0||y>H)continue;
    const a=.04*(1-Math.abs(y-my)/180);
    if(a>0){ctx.strokeStyle='rgba(0,200,255,'+a+')';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(Math.max(0,gx-180),y);ctx.lineTo(Math.min(W,gx+180),y);ctx.stroke()}
  }

  requestAnimationFrame(loop);
})();

setInterval(render,15000);
</script>
</body>
</html>
